<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button</title>
</head>
<body>
  <form action=""> <!--type-->
    <input type="text">
    <button name="submit">Enviar</button>
    <button name="reset" type="reset">Excluir</button>
  </form>

  <form action=""> <!--autofocus-->
    <input type="text">
    <button name="focus" autofocus>Enviar</button>
  </form>

  <form action=""> <!--disabled-->
    <input type="text">
    <button name="disabled" disabled>Enviar</button>
  </form>

  <form action=""> <!--value-->
    <input type="text">
    <button name="value" value="valor_do_botao">Enviar</button>
  </form>
</body>
</html>
