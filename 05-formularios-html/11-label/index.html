<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Label</title>
  </head>
  <body>
    <!--ID-->
    <form action="">
      <label for="nome">Nome</label>
      <input id="name" type="text" name="nome" placeholder="Insira seu nome" />
      <button>Enviar</button>
    </form>

    <!--sem ID-->
    <form action="">
      <label>
        Nome
        <input type="text" name="nome_sem_id" placeholder="Insira seu nome" />
      </label>
      <button>Enviar</button>
    </form>
  </body>
</html>
