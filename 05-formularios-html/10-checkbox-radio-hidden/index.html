<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Checkbox, Radio e Hidden</title>
  </head>
  <body>
    <!--checkbox-->
    <form action="">
      <input type="checkbox" name="carro" value="bmw" />
      <input type="checkbox" name="carro" value="chevrolet" />
      <button>Submit</button>
    </form>

    <!--radio-->
    <form action="">
      <input type="radio" name="carro" value="bmw" />
      <input type="radio" name="carro" value="bugatti" />
      <input type="radio" name="carro" value="audi" />
      <button>Submit</button>
    </form>

    <!--hidden-->
    <form action="">
      <input type="hidden" name="id" value="123456789" />
      <button>Submit</button>
    </form>
  </body>
</html>
