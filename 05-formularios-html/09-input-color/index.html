<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Color</title>
  </head>
  <body>
    <form action="">
      <datalist id="colorpicker">
        <option value="#FCAC00"></option>
        <option value="#ACFCD0"></option>
      </datalist>
      <input type="color" name="cor" list="colorpicker" />
      <button>Submit</button>
    </form>
  </body>
</html>
