<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Password</title>
  </head>
  <body>
    <form action="">
      <input
        type="password"
        minlength="8"
        maxlength="16"
        pattern="[0-9a-fA-F]{8,16}"
        title="Somente senhas de 8 a 16 caracteres serão aceitas."
      />
      <button>Enviar</button>
    </form>
  </body>
</html>
